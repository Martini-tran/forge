<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>文件搜索</title>
    <style>
      /*
       * Theme tokens mirror the launcher's palette (src/renderer/index.css).
       * ui.js toggles the `light`/`dark` class on <html> to match the app theme
       * (pushed over window.pluginHost). Until that arrives — or if the bridge
       * is unavailable — the bare `:root` follows the OS scheme so text is never
       * stuck light-on-light / dark-on-dark.
       */
      :root {
        color-scheme: light;
        --foreground: oklch(0.145 0 0);
        --muted-foreground: oklch(0.556 0 0);
        --border: oklch(0.922 0 0);
        --border-strong: oklch(0.708 0 0);
        --input: oklch(0 0 0 / 4%);
        --accent: oklch(0 0 0 / 6%);
        --scrollbar: oklch(0 0 0 / 20%);
        --danger: oklch(0.577 0.245 27.325);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --foreground: oklch(0.985 0 0);
          --muted-foreground: oklch(0.708 0 0);
          --border: oklch(1 0 0 / 12%);
          --border-strong: oklch(1 0 0 / 28%);
          --input: oklch(1 0 0 / 6%);
          --accent: oklch(1 0 0 / 8%);
          --scrollbar: oklch(1 0 0 / 18%);
          --danger: oklch(0.704 0.191 22.216);
        }
      }
      /* Explicit app theme overrides the OS default (defined last so it wins). */
      .light {
        color-scheme: light;
        --foreground: oklch(0.145 0 0);
        --muted-foreground: oklch(0.556 0 0);
        --border: oklch(0.922 0 0);
        --border-strong: oklch(0.708 0 0);
        --input: oklch(0 0 0 / 4%);
        --accent: oklch(0 0 0 / 6%);
        --scrollbar: oklch(0 0 0 / 20%);
        --danger: oklch(0.577 0.245 27.325);
      }
      .dark {
        color-scheme: dark;
        --foreground: oklch(0.985 0 0);
        --muted-foreground: oklch(0.708 0 0);
        --border: oklch(1 0 0 / 12%);
        --border-strong: oklch(1 0 0 / 28%);
        --input: oklch(1 0 0 / 6%);
        --accent: oklch(1 0 0 / 8%);
        --scrollbar: oklch(1 0 0 / 18%);
        --danger: oklch(0.704 0.191 22.216);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        color: var(--foreground);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      #q {
        flex: 0 0 auto;
        margin: 8px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--input);
        color: inherit;
        font-size: 13px;
        outline: none;
      }
      #q::placeholder {
        color: var(--muted-foreground);
      }
      #q:focus {
        border-color: var(--border-strong);
      }
      #list {
        flex: 1 1 auto;
        margin: 0;
        padding: 0 6px 6px;
        list-style: none;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--scrollbar) transparent;
      }
      #list::-webkit-scrollbar {
        width: 8px;
      }
      #list::-webkit-scrollbar-thumb {
        background-color: var(--scrollbar);
        border: 2px solid transparent;
        border-radius: 9999px;
        background-clip: content-box;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 8px;
        cursor: default;
      }
      .row.sel,
      .row:hover {
        background: var(--accent);
      }
      .icon {
        flex: 0 0 auto;
        font-size: 15px;
        line-height: 1;
        width: 18px;
        text-align: center;
      }
      .main {
        flex: 1 1 auto;
        min-width: 0;
      }
      .title {
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sub {
        margin-top: 2px;
        font-size: 11px;
        color: var(--muted-foreground);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .meta {
        flex: 0 0 auto;
        font-size: 11px;
        color: var(--muted-foreground);
        text-align: right;
        white-space: nowrap;
      }
      .acts {
        flex: 0 0 auto;
        display: none;
        gap: 4px;
      }
      .row:hover .acts,
      .row.sel .acts {
        display: flex;
      }
      .act {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted-foreground);
        border-radius: 6px;
        padding: 2px 6px;
        font-size: 11px;
        cursor: pointer;
      }
      .act:hover {
        color: var(--foreground);
        border-color: var(--border-strong);
      }
      .empty {
        padding: 24px 16px;
        text-align: center;
        font-size: 12px;
        line-height: 1.7;
        color: var(--muted-foreground);
      }
      .empty b {
        color: var(--foreground);
      }
      .empty.err b {
        color: var(--danger);
      }
      .footer {
        flex: 0 0 auto;
        display: flex;
        gap: 12px;
        padding: 6px 12px;
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: var(--muted-foreground);
      }
      .footer kbd {
        font-family: inherit;
        background: var(--input);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0 4px;
      }
      .toast {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--foreground);
        color: var(--input);
        padding: 5px 12px;
        border-radius: 9999px;
        font-size: 12px;
        opacity: 0;
        transition: opacity 0.15s;
        pointer-events: none;
      }
      .toast.show {
        opacity: 0.92;
      }
    </style>
  </head>
  <body>
    <input
      id="q"
      type="text"
      placeholder="搜索本地文件（由 Everything 提供）…"
      autocomplete="off"
      spellcheck="false"
    />
    <ul id="list"></ul>
    <div class="footer">
      <span><kbd>↵</kbd> 打开</span>
      <span><kbd>Ctrl</kbd>+<kbd>↵</kbd> 打开文件夹</span>
      <span><kbd>Ctrl</kbd>+<kbd>C</kbd> 复制路径</span>
      <span><kbd>Esc</kbd> 返回</span>
    </div>
    <div id="toast" class="toast"></div>
    <script src="ui.js"></script>
  </body>
</html>
