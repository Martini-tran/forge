<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>剪贴板历史</title>
    <style>
      /*
       * Theme tokens mirror the launcher's palette (src/renderer/index.css).
       * ui.js toggles the `light`/`dark` class on <html> to match the app theme
       * (pushed over window.pluginHost). Until that arrives — or if the bridge
       * is unavailable — the bare `:root` follows the OS scheme so text is never
       * stuck light-on-light / dark-on-dark.
       */
      :root {
        color-scheme: light;
        --foreground: oklch(0.145 0 0);
        --muted-foreground: oklch(0.556 0 0);
        --border: oklch(0.922 0 0);
        --border-strong: oklch(0.708 0 0);
        --input: oklch(0 0 0 / 4%);
        --accent: oklch(0 0 0 / 6%);
        --scrollbar: oklch(0 0 0 / 20%);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --foreground: oklch(0.985 0 0);
          --muted-foreground: oklch(0.708 0 0);
          --border: oklch(1 0 0 / 12%);
          --border-strong: oklch(1 0 0 / 28%);
          --input: oklch(1 0 0 / 6%);
          --accent: oklch(1 0 0 / 8%);
          --scrollbar: oklch(1 0 0 / 18%);
        }
      }
      /* Explicit app theme overrides the OS default (defined last so it wins). */
      .light {
        color-scheme: light;
        --foreground: oklch(0.145 0 0);
        --muted-foreground: oklch(0.556 0 0);
        --border: oklch(0.922 0 0);
        --border-strong: oklch(0.708 0 0);
        --input: oklch(0 0 0 / 4%);
        --accent: oklch(0 0 0 / 6%);
        --scrollbar: oklch(0 0 0 / 20%);
      }
      .dark {
        color-scheme: dark;
        --foreground: oklch(0.985 0 0);
        --muted-foreground: oklch(0.708 0 0);
        --border: oklch(1 0 0 / 12%);
        --border-strong: oklch(1 0 0 / 28%);
        --input: oklch(1 0 0 / 6%);
        --accent: oklch(1 0 0 / 8%);
        --scrollbar: oklch(1 0 0 / 18%);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        color: var(--foreground);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      #q {
        flex: 0 0 auto;
        margin: 8px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--input);
        color: inherit;
        font-size: 13px;
        outline: none;
      }
      #q::placeholder {
        color: var(--muted-foreground);
      }
      #q:focus {
        border-color: var(--border-strong);
      }
      #list {
        flex: 1 1 auto;
        margin: 0;
        padding: 0 6px 6px;
        list-style: none;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--scrollbar) transparent;
      }
      #list::-webkit-scrollbar {
        width: 8px;
      }
      #list::-webkit-scrollbar-thumb {
        background-color: var(--scrollbar);
        border: 2px solid transparent;
        border-radius: 9999px;
        background-clip: content-box;
      }
      .row {
        padding: 6px 8px;
        border-radius: 8px;
        cursor: default;
      }
      .row.sel,
      .row:hover {
        background: var(--accent);
      }
      .title {
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sub {
        margin-top: 2px;
        font-size: 11px;
        color: var(--muted-foreground);
      }
      .empty {
        padding: 16px;
        text-align: center;
        font-size: 12px;
        color: var(--muted-foreground);
      }
    </style>
  </head>
  <body>
    <input
      id="q"
      type="text"
      placeholder="搜索剪贴板历史…"
      autocomplete="off"
    />
    <ul id="list"></ul>
    <script src="ui.js"></script>
  </body>
</html>
